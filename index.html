<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marilina Info</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; }
        body {
            margin: 0; padding: 20px; font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
            background: linear-gradient(180deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            background-attachment: fixed; color: white; display: flex; justify-content: center;
        }
        .card {
            width: 100%; max-width: 360px; background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 25px; padding: 25px; border: 1px solid rgba(255,255,255,0.2);
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .flags-row { display: flex; justify-content: center; gap: 18px; margin-bottom: 20px; }
        .flag-btn { font-size: 32px; cursor: pointer; filter: grayscale(0.9); transition: 0.3s; padding: 5px; -webkit-tap-highlight-color: transparent; }
        .flag-btn.active { filter: grayscale(0); transform: scale(1.15); border-bottom: 2px solid var(--gold); }
        
        h1 { color: var(--gold); letter-spacing: 3px; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-size: 2.2rem; }
        .intro {
            background: rgba(0,0,0,0.4); padding: 18px; border-radius: 15px;
            border-left: 5px solid var(--gold); font-style: italic; text-align: left;
            line-height: 1.6; margin-bottom: 25px; font-size: 0.95rem;
        }
        .menu-btn {
            background: rgba(255,255,255,0.1); width: 100%; border: 1px solid rgba(212, 175, 55, 0.5);
            padding: 16px; margin-bottom: 12px; border-radius: 15px; color: white;
            font-weight: bold; font-size: 1rem; cursor: pointer; display: flex;
            align-items: center; gap: 12px; outline: none; -webkit-tap-highlight-color: transparent;
        }
        .menu-btn i, .menu-btn span { pointer-events: none; }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 99999; justify-content: center; align-items: center;
        }
        .popup {
            background: white; color: #222; width: 88%; max-width: 320px;
            border-radius: 20px; overflow: hidden; position: relative;
        }
        .p-head { background: linear-gradient(to right, #1a2a6c, #801313); color: white; padding: 18px; font-weight: bold; }
        .p-text { padding: 25px; line-height: 1.7; font-size: 1.05rem; }
        .close-x { position: absolute; top: 10px; right: 15px; color: white; font-size: 35px; cursor: pointer; line-height: 1; }
    </style>
</head>
<body>

    <div class="card">
        <div class="flags-row">
            <div class="flag-btn active" data-l="el">🇬🇷</div>
            <div class="flag-btn" data-l="en">🇬🇧</div>
            <div class="flag-btn" data-l="fr">🇫🇷</div>
            <div class="flag-btn" data-l="de">🇩🇪</div>
        </div>

        <h1 id="n-val">ΜΑΡΙΛΙΝΑ</h1>
        <div id="i-val" class="intro">"Μαριλίνα: Η αγγελιοφόρος της χάρης. Ένας ιερός συνδυασμός της Μαρίας και της Ευαγγελίας, που συμβολίζει την αγάπη και το χαρμόσυνο μήνυμα της ζωής."</div>

        <button class="menu-btn" data-i="0"><i class="fas fa-scroll"></i> <span id="b0">Ετυμολογία & Σημασία</span></button>
        <button class="menu-btn" data-i="1"><i class="fas fa-dove"></i> <span id="b1">Σύμβολο Ευλογίας</span></button>
        <button class="menu-btn" data-i="2"><i class="fas fa-cross"></i> <span id="b2">Θρησκευτικό Βάθος</span></button>
        <button class="menu-btn" data-i="3"><i class="fas fa-sparkles"></i> <span id="b3">Προσωπικότητα</span></button>
    </div>

    <div id="overlay">
        <div class="popup">
            <div class="close-x">&times;</div>
            <div id="p-t" class="p-head"></div>
            <div id="p-d" class="p-text"></div>
        </div>
    </div>

    <script>
        const repo = {
            el: { n: "ΜΑΡΙΛΙΝΑ", i: '"Μαριλίνα: Η αγγελιοφόρος της χάρης. Ένας ιερός συνδυασμός της Μαρίας και της Ευαγγελίας, που συμβολίζει την αγάπη και το χαρμόσυνο μήνυμα της ζωής."', b: ["Ετυμολογία & Σημασία", "Σύμβολο Ευλογίας", "Θρησκευτικό Βάθος", "Προσωπικότητα"], d: ["Σύνθετο όνομα από το Μαρία (αγαπημένη/δέσποινα) και το Ευαγγελία (ευάγγελος/καλή είδηση). Σημαίνει την αγαπημένη που φέρνει το μήνυμα της χαράς.", "Αντιπροσωπεύει τη λάμψη και την πνευματική ανάταση. Είναι ένα όνομα που συνδυάζει την παράδοση με μια σύγχρονη, μελωδική αύρα.", "Φέρει τη διπλή ευλογία της Παναγίας και του Ευαγγελισμού, συμβολίζοντας την πίστη, την ελπίδα και την ιερότητα της προσφοράς.", "Μια Μαριλίνα είναι επικοινωνιακή, γεμάτη φως και αισιοδοξία. Διακρίνεται για την ενσυναίσθηση και την ικανότητά της να μεταδίδει χαρά στους γύρω της."] },
            en: { n: "MARILINA", i: '"Marilina: The messenger of grace. A sacred blend of Maria and Evangelia, symbolizing love and the joyful message of life."', b: ["Etymology & Meaning", "Symbol of Blessing", "Religious Depth", "Personality"], d: ["A compound name from Maria (beloved) and Evangelia (bearer of good news). It signifies the beloved one who carries a message of joy.", "It represents brilliance and spiritual elevation. A name that combines deep tradition with a modern, melodic aura.", "It carries the double blessing of the Virgin Mary and the Annunciation, symbolizing faith, hope, and the sanctity of giving.", "A Marilina is communicative, full of light and optimism. She is known for her empathy and her ability to spread joy."] },
            fr: { n: "MARILINA", i: '"Marilina : la messagère de grâce. Un mélange sacré de Maria et Evangelia, symbolisant l\'amour et le joyeux message de la vie."', b: ["Étymologie", "Symbole de Bénédiction", "Profondeur Religieuse", "Personnalité"], d: ["Nom composé de Maria (aimée) et Evangelia (bonne nouvelle). Signifie celle qui est chérie και apporte la joie.", "Représente l'éclat και l'élévation spirituelle. Un nom qui unit la tradition à une aura moderne et mélodique.", "Porte la double bénédiction de la Vierge et de l'Annonciation, symbolisant la foi et l'espérance.", "Marilina se distingue par son optimisme, sa lumière et sa capacité à transmettre le bonheur."] },
            de: { n: "MARILINA", i: '"Marilina: Die Botin der Gnade. Eine heilige Mischung aus Maria und Evangelia, die Liebe und die frohe Botschaft des Lebens symbolisiert."', b: ["Etymologie", "Symbol des Segens", "Religiöse Tiefe", "Persönlichkeit"], d: ["Zusammengesetzt aus Maria (Geliebte) und Evangelia (Gute Nachricht). Es bedeutet die Geliebte, die Freude bringt.", "Es steht für Glanz und geistige Erhebung. Ein Name, der tiefe Tradition mit einer modernen, melodischen Aura verbindet.", "Verbindet den Segen Marias mit der Verkündigung, was Glauben und Hoffnung symbolisiert.", "Eine Marilina ist kommunikativ, lichtvoll und optimistisch. Sie zeichnet sich durch Mitgefühl aus."] }
        };

        let activeL = 'el';

        document.addEventListener('DOMContentLoaded', () => {
            const view = document.getElementById('overlay');

            document.addEventListener('click', (e) => {
                const f = e.target.closest('.flag-btn');
                const m = e.target.closest('.menu-btn');
                const c = e.target.closest('.close-x') || e.target === view;

                if (f) {
                    activeL = f.getAttribute('data-l');
                    document.querySelectorAll('.flag-btn').forEach(el => el.classList.remove('active'));
                    f.classList.add('active');
                    document.getElementById('n-val').innerText = repo[activeL].n;
                    document.getElementById('i-val').innerText = repo[activeL].i;
                    for(let k=0; k<4; k++) document.getElementById('b'+k).innerText = repo[activeL].b[k];
                }
                
                if (m) {
                    const idx = m.getAttribute('data-i');
                    document.getElementById('p-t').innerText = repo[activeL].b[idx];
                    document.getElementById('p-d').innerText = repo[activeL].d[idx];
                    view.style.display = 'flex';
                }
                
                if (c) view.style.display = 'none';
            });
        });
    </script>
</body>
</html>
